<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestmentViewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #F5F5F7;
            --card: #FFFFFF;
            --border: #E8E8EE;
            --text: #111111;
            --muted: #8A8A9A;
            --accent: #5B4CF5;
            --accent-hover: #4A3CE0;
            --error-bg: #FFF2F2;
            --error: #EF4444;
            --input-bg: #FAFAFA;
            --shadow: 0 2px 24px rgba(0,0,0,0.07);
        }
        [data-theme="dark"] {
            --bg: #0D0D14;
            --card: #16161F;
            --border: #1E1E2E;
            --text: #F0F0F5;
            --muted: #5A5A7A;
            --input-bg: #0D0D14;
            --shadow: 0 2px 24px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transition: background 0.2s, color 0.2s;
        }

        .theme-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            transition: background 0.2s, border 0.2s;
            font-size: 1rem;
        }
        .theme-btn:hover { color: var(--text); }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--shadow);
            animation: fadeUp 0.35s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-mark {
            width: 44px;
            height: 44px;
            background: #EBE8FE;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
        }
        [data-theme="dark"] .logo-mark { background: #1E1B3A; }

        .logo-mark svg { display: block; }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.03em;
            margin-bottom: 0.3rem;
        }
        .subtitle {
            font-size: 0.875rem;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .error-box {
            background: var(--error-bg);
            color: var(--error);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.65rem 0.9rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 0.75rem;
        }
        .input-wrap svg {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.6rem;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 0.95rem;
            color: var(--text);
            letter-spacing: 0.15em;
            outline: none;
            transition: border-color 0.15s, background 0.2s;
        }
        input[type="password"]::placeholder {
            font-family: 'IBM Plex Sans', sans-serif;
            letter-spacing: normal;
            color: var(--muted);
            font-size: 0.875rem;
        }
        input[type="password"]:focus {
            border-color: var(--accent);
            background: var(--card);
            box-shadow: 0 0 0 3px rgba(91,76,245,0.12);
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            margin-top: 0.25rem;
        }
        .login-btn:hover { background: var(--accent-hover); }
        .login-btn:active { transform: scale(0.98); }

        .security-note {
            text-align: center;
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
        }
    </style>
</head>
<body>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="테마 전환" id="theme-toggle">
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <div class="card">
        <div class="logo-mark">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polyline points="2,16 7,10 11,13 16,6 20,8" stroke="#5B4CF5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="20" cy="8" r="2" fill="#5B4CF5"/>
            </svg>
        </div>

        <h1>InvestmentViewer</h1>
        <p class="subtitle">자산 현황을 확인하세요</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error-box">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="post">
            <div class="input-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input type="password" name="pin" required placeholder="PIN 번호 입력" autofocus>
            </div>
            <button type="submit" class="login-btn">로그인</button>
        </form>

        <p class="security-note">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            내 자산은 안전하게 보호됩니다
        </p>
    </div>

    <script>
        (function() {
            const saved = localStorage.getItem('iv-theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            updateIcons(saved);
        })();

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('iv-theme', next);
            updateIcons(next);
        }

        function updateIcons(theme) {
            document.getElementById('icon-sun').style.display  = theme === 'dark'  ? 'block' : 'none';
            document.getElementById('icon-moon').style.display = theme === 'light' ? 'block' : 'none';
        }
    </script>
</body>
</html>
