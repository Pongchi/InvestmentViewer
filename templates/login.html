<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투자현황 로그인</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F2F4F6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        .icon {
            width: 52px;
            height: 52px;
            background: #EBF2FF;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #191F28;
            margin-bottom: 0.4rem;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #8B95A1;
            margin-bottom: 2rem;
        }
        .error {
            background: #FFF2F2;
            color: #F04452;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1.5px solid #E5E8EB;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            color: #191F28;
            background: #F9FAFB;
            outline: none;
            transition: border-color 0.15s;
            margin-bottom: 0.75rem;
        }
        input[type="password"]:focus {
            border-color: #3182F6;
            background: #fff;
        }
        input[type="password"]::placeholder { color: #B0B8C1; }
        button {
            width: 100%;
            padding: 0.95rem;
            background: #3182F6;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 0.25rem;
        }
        button:hover { background: #1B6EE4; }
        button:active { background: #1560CF; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📈</div>
        <h2>투자현황</h2>
        <p class="subtitle">PIN 번호를 입력하세요</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="post">
            <input type="password" name="pin" required placeholder="PIN Number" autofocus>
            <button type="submit">로그인</button>
        </form>
    </div>
</body>
</html>
